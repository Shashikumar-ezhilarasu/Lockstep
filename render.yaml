services:
  - type: web
    name: lockstep-backend
    env: node
    rootDir: backend
    buildCommand: pnpm install
    startCommand: pnpm run start:all
    envVars:
      - key: PNPM_VERSION
        value: 9.0.0
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
